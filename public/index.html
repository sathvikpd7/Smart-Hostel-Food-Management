<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Hostel Food Management</title>
    <meta name="description" content="Backend is running. Start the frontend dev server to view the app." />
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f7fafc;
        color: #1f2937;
      }
      .container {
        max-width: 720px;
        margin: 10vh auto;
        padding: 24px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 12px; font-size: 24px; }
      p { margin: 0 0 8px; line-height: 1.5; }
      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }
      .hint {
        margin-top: 12px;
        color: #6b7280;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Backend is running</h1>
      <p>This server provides the API for Smart Hostel Food Management.</p>
      <p>To view the app UI, start the frontend dev server and open <code>http://localhost:5173</code>.</p>
    </div>
  </body>
</html>
